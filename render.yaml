services:
  # Web service — Django + Daphne
  - type: web
    name: prahari-web
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: >
      daphne -b 0.0.0.0 -p $PORT
      config.asgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: prahari-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: SITE_URL
        sync: false
    healthCheckPath: /api/docs/

  # Celery worker service
  - type: worker
    name: prahari-celery
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >
      celery -A config worker
      --loglevel=info --pool=solo
      --concurrency=1
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: prahari-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_2
        sync: false

databases:
  - name: prahari-db
    plan: free
