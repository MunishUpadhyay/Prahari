<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAHARI — Live Operations Command Centre</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Base Styling & Color Variables */
        :root {
            --bg-primary: #090d16;
            --bg-secondary: #0f172a;
            --bg-card: rgba(22, 28, 45, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(99, 102, 241, 0.15);
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-inverse: #0f172a;

            --color-critical: #ef4444;
            --color-high: #f97316;
            --color-medium: #eab308;
            --color-low: #22c55e;
            
            --color-legal: #3b82f6;
            --color-health: #14b8a6;
            --color-emergency: #ec4899;
            --color-cross: #8b5cf6;
            
            --neon-shadow-critical: 0 0 15px rgba(239, 68, 68, 0.35);
            --neon-shadow-high: 0 0 15px rgba(249, 115, 22, 0.35);
            --neon-shadow-medium: 0 0 15px rgba(234, 179, 8, 0.35);
            --neon-shadow-low: 0 0 15px rgba(34, 197, 94, 0.35);
            
            --glow-indigo: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.08) 0px, transparent 50%);
        }

        /* Glassmorphic Navigation / Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-pulse {
            width: 14px;
            height: 14px;
            background-color: #6366f1;
            border-radius: 50%;
            box-shadow: 0 0 10px #6366f1, 0 0 20px #6366f1;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.9);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 15px #6366f1, 0 0 25px #6366f1;
            }
            100% {
                transform: scale(0.9);
                opacity: 1;
            }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        /* Status & Counter Pills */
        .pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--color-critical);
            box-shadow: 0 0 8px var(--color-critical);
        }

        .status-dot.connected {
            background-color: var(--color-low);
            box-shadow: 0 0 8px var(--color-low);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .counter-badge {
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
            padding: 0.15rem 0.6rem;
            border-radius: 6px;
            font-weight: 700;
            margin-left: 0.25rem;
        }

        /* Layout Container */
        main {
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Waiting / Empty State */
        .waiting-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.3);
            text-align: center;
        }

        .radar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid rgba(99, 102, 241, 0.4);
            position: relative;
            margin-bottom: 2rem;
            animation: radar-pulse 3s infinite linear;
        }

        .radar::before, .radar::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(20, 184, 166, 0.3);
        }

        .radar::before {
            width: 140px;
            height: 140px;
            animation: radar-glow 3s infinite linear;
            animation-delay: 1s;
        }

        @keyframes radar-pulse {
            0% { transform: scale(0.6); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .waiting-state h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .waiting-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Incident Feed Card List */
        #incident-feed {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        /* Incident Card styling */
        .incident-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: slide-in-card 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slide-in-card {
            0% {
                opacity: 0;
                transform: translateY(25px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .incident-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.35);
            box-shadow: var(--glow-indigo), 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        /* Border indicator dynamically colored by severity on hover */
        .severity-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background-color: var(--text-muted);
        }

        .incident-card.critical .severity-bar { background-color: var(--color-critical); }
        .incident-card.high .severity-bar { background-color: var(--color-high); }
        .incident-card.medium .severity-bar { background-color: var(--color-medium); }
        .incident-card.low .severity-bar { background-color: var(--color-low); }

        /* Card Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1.25rem;
        }

        .title-block {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .incident-title-en {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.3;
        }

        .incident-title-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #cbd5e1;
            line-height: 1.4;
        }

        .badge-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
        }

        /* Severity Badge classes */
        .badge.critical { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); box-shadow: 0 0 10px rgba(239, 68, 68, 0.1); }
        .badge.high { background: rgba(249, 115, 22, 0.15); color: #fb923c; border: 1px solid rgba(249, 115, 22, 0.3); }
        .badge.medium { background: rgba(234, 179, 8, 0.15); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.3); }
        .badge.low { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }

        /* Domain Badge classes */
        .badge.domain-legal { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        .badge.domain-health { background: rgba(20, 184, 166, 0.15); color: #2dd4bf; border: 1px solid rgba(20, 184, 166, 0.3); }
        .badge.domain-emergency { background: rgba(236, 72, 153, 0.15); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.3); }
        .badge.domain-cross { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.3); }

        /* Brief Panels - Bilingual Column Layout */
        .briefs-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .briefs-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .brief-box {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .brief-box h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
        }

        .brief-box.hindi h4 {
            font-family: 'Inter', sans-serif;
        }

        .brief-text-en {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #e2e8f0;
        }

        .brief-text-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #f1f5f9;
        }

        /* Actions Section */
        .actions-section {
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 1.25rem;
        }

        .actions-section h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .action-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .action-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }

        .action-num {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .action-details {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .action-text-en {
            font-size: 0.925rem;
            line-height: 1.4;
            color: #f1f5f9;
        }

        .action-text-hi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            color: #cbd5e1;
        }

        .action-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .action-owner {
            color: #f472b6;
            font-weight: 600;
        }

        .action-time {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
        }

        /* Resources / Info Footer Row */
        .card-footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1rem 0 0 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .tags-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .footer-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #cbd5e1;
        }

        .timestamp {
            font-family: monospace;
            font-size: 0.75rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-pulse"></div>
            <h1>Prahari</h1>
        </div>
        <div class="header-meta">
            <div class="pill">
                Status: <span id="status-text">Connecting</span>
                <span id="status-indicator" class="status-dot"></span>
            </div>
            <div class="pill">
                Session Incidents: <span id="incident-count" class="counter-badge">0</span>
            </div>
        </div>
    </header>

    <main>
        <!-- Awaiting State (Hidden once first card arrives) -->
        <div id="no-incidents-placeholder" class="waiting-state">
            <div class="radar"></div>
            <h3>System Online</h3>
            <p>Awaiting incoming civic signals and multi-agent pipeline broadcasts...</p>
        </div>

        <!-- Scrollable Incident Cards Feed -->
        <div id="incident-feed"></div>
    </main>

    <footer>
        PRAHARI Real-Time Operations. Operationalized by Multi-Agent Synthesized Diagnostics.
    </footer>

    <script>
        // Track stats
        let totalIncidents = 0;

        // UI Selectors
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.getElementById('status-indicator');
        const incidentCountBadge = document.getElementById('incident-count');
        const noIncidentsPlaceholder = document.getElementById('no-incidents-placeholder');
        const incidentFeed = document.getElementById('incident-feed');

        // Connect to Django Channels WebSocket Endpoint
        const wsUrl = `ws://${window.location.host}/ws/dashboard/`;
        console.log(`Connecting to WebSocket: ${wsUrl}`);
        
        let ws;

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log("WebSocket connection established.");
                statusText.textContent = "Connected";
                statusIndicator.className = "status-dot connected";
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log("New incident event received:", data);
                    renderIncident(data);
                } catch (e) {
                    console.error("Error parsing WebSocket packet:", e);
                }
            };

            ws.onclose = () => {
                console.log("WebSocket connection closed. Retrying in 3 seconds...");
                statusText.textContent = "Disconnected";
                statusIndicator.className = "status-dot";
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => {
                console.error("WebSocket error observed:", err);
            };
        }

        // Initialize WebSockets
        connectWebSocket();

        // Helper to format ISO strings
        function formatTime(isoString) {
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString() + ' ' + date.toLocaleDateString();
            } catch (e) {
                return isoString;
            }
        }

        // Render Incident Cards dynamically
        function renderIncident(incident) {
            // Hide placeholder on first card
            if (totalIncidents === 0) {
                noIncidentsPlaceholder.style.display = 'none';
            }

            // Increment Count
            totalIncidents++;
            incidentCountBadge.textContent = totalIncidents;

            // Extract outputs safely
            const agentOutputs = incident.agent_outputs || {};
            const coord = agentOutputs.coordination || {};
            const lang = agentOutputs.language || {};
            const hindi = lang.hindi || {};

            // 1. Title Resolution (fallback to brief or generic title if missing)
            const titleEn = coord.situation_title || incident.situation_brief || "Incident Ingested";
            const titleHi = hindi.situation_title || "";

            // 2. Severity Mappings
            const severityScore = parseFloat(incident.severity) || coord.overall_severity_score || 0.5;
            let severityLabel = coord.overall_severity || "medium";
            // Normalize labels
            severityLabel = severityLabel.toLowerCase().trim();
            if (severityLabel === "immediate") severityLabel = "critical";

            // 3. Domain Resolution
            const domain = (incident.domain || "cross").toLowerCase();

            // 4. Briefs
            const briefEn = incident.situation_brief || coord.situation_brief || "No English brief available.";
            const briefHi = incident.situation_brief_hindi || hindi.situation_brief || "";

            // Create Card Element
            const card = document.createElement('div');
            card.className = `incident-card ${severityLabel}`;
            card.id = `incident-${incident.incident_id}`;

            // Build Header
            let headerHTML = `
                <div class="severity-bar"></div>
                <div class="card-header">
                    <div class="title-block">
                        <div class="incident-title-en">${titleEn}</div>
                        ${titleHi ? `<div class="incident-title-hi">${titleHi}</div>` : ''}
                    </div>
                    <div class="badge-row">
                        <span class="badge ${severityLabel}">${severityLabel} (${severityScore.toFixed(2)})</span>
                        <span class="badge domain-${domain}">${domain}</span>
                    </div>
                </div>
            `;

            // Build Brief sections
            let briefsHTML = `
                <div class="briefs-container">
                    <div class="brief-box english">
                        <h4>Situation Brief (EN)</h4>
                        <div class="brief-text-en">${briefEn}</div>
                    </div>
                    ${briefHi ? `
                    <div class="brief-box hindi">
                        <h4>स्थिति विवरण (HI)</h4>
                        <div class="brief-text-hi">${briefHi}</div>
                    </div>
                    ` : ''}
                </div>
            `;

            // Build Immediate Actions (English & Hindi)
            let actionsHTML = '';
            const actionsEn = coord.immediate_actions || [];
            const actionsHi = hindi.immediate_actions || [];

            if (actionsEn.length > 0) {
                let actionItemsHTML = '';
                actionsEn.forEach((act, idx) => {
                    const actHi = actionsHi[idx] || {};
                    actionItemsHTML += `
                        <li class="action-item">
                            <div class="action-num">${idx + 1}</div>
                            <div class="action-details">
                                <div class="action-text-en">${act.action}</div>
                                ${actHi.action ? `<div class="action-text-hi">${actHi.action}</div>` : ''}
                                <div class="action-meta">
                                    Owner: <span class="action-owner">${act.responsible_party || 'Unassigned'}</span> 
                                    ${act.time_window ? `&bull; Window: <span class="action-time">${act.time_window}</span>` : ''}
                                </div>
                            </div>
                        </li>
                    `;
                });

                actionsHTML = `
                    <div class="actions-section">
                        <h4>Immediate Actions / तत्काल कार्रवाई</h4>
                        <ul class="action-list">
                            ${actionItemsHTML}
                        </ul>
                    </div>
                `;
            }

            // Build Resources needed tags
            const resources = coord.resources_needed || [];
            const resourcesHi = hindi.resources_needed || [];
            let resourcesHTML = '';
            if (resources.length > 0) {
                let tagsHTML = '';
                resources.forEach((res, idx) => {
                    const resHi = resourcesHi[idx];
                    tagsHTML += `<span class="footer-tag">${res}${resHi ? ` (${resHi})` : ''}</span>`;
                });
                resourcesHTML = `
                    <div class="tags-group">
                        <span>Required:</span>
                        ${tagsHTML}
                    </div>
                `;
            }

            // Assemble Card HTML
            card.innerHTML = `
                ${headerHTML}
                ${briefsHTML}
                ${actionsHTML}
                <div class="card-footer">
                    ${resourcesHTML}
                    <div class="timestamp">Ingested: ${formatTime(incident.timestamp)}</div>
                </div>
            `;

            // Append Card and auto-scroll
            incidentFeed.appendChild(card);
            card.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
    </script>
</body>
</html>
